<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Teacher FileVault Cloud Sync Pro</title><style>
:root{--bg:#f6f8fc;--card:#fff;--txt:#0f172a;--mut:#64748b;--pri:#2563eb;--ok:#16a34a;--warn:#d97706;--bad:#dc2626;--line:#e2e8f0;--r:20px}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Segoe UI,Arial;background:var(--bg);color:var(--txt)}body.dark{--bg:#0b1220;--card:#111827;--txt:#e5e7eb;--mut:#94a3b8;--line:#243244}.auth,.app{min-height:100vh}.auth{display:grid;place-items:center;padding:20px;background:radial-gradient(circle at top,#dbeafe,transparent 35%),var(--bg)}.box,.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:0 14px 36px #0f172a14}.box{width:min(460px,100%);padding:24px}.brand{display:flex;gap:12px;align-items:center}.logo{width:50px;height:50px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#2563eb,#f59e0b);color:white;font-size:24px}.row{display:grid;gap:12px;margin:12px 0}.grid{display:grid;gap:14px}.cols{grid-template-columns:repeat(2,minmax(0,1fr))}.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}.layout{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.side{background:var(--card);border-right:1px solid var(--line);padding:16px;position:sticky;top:0;height:100vh;overflow:auto}.nav{display:grid;gap:7px;margin-top:14px}.nav button{width:100%;text-align:left;margin:0;display:flex;align-items:center;gap:10px;min-height:46px}.hide-desk{display:none!important}.main{padding:18px 18px 90px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:16px}.btn,button{border:0;border-radius:14px;padding:11px 14px;background:var(--pri);color:white;font-weight:800;cursor:pointer}.secondary{background:#e2e8f0;color:#0f172a}.danger{background:var(--bad)}.warn{background:var(--warn)}.good{background:var(--ok)}input,select,textarea{width:100%;border:1px solid var(--line);background:var(--card);color:var(--txt);border-radius:14px;padding:12px;font:inherit}label{font-weight:800;font-size:.9rem}.hint,.mut{color:var(--mut);font-size:.92rem}.pill{display:inline-flex;padding:7px 10px;border-radius:999px;background:#eff6ff;color:#1d4ed8;margin:3px}.file{display:flex;gap:12px;align-items:flex-start}.ico{width:44px;height:44px;border-radius:14px;display:grid;place-items:center;background:#dbeafe}.actions{display:flex;gap:8px;flex-wrap:wrap}.drop{border:2px dashed #93c5fd;border-radius:22px;padding:22px;text-align:center;background:#eff6ff22}.timeline{display:grid;gap:10px}.log{display:flex;gap:10px;padding:12px;border:1px solid var(--line);border-radius:16px;background:var(--card)}.badge{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;background:#eef2ff}.bar{height:8px;background:#e2e8f0;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;width:0;background:var(--pri)}.hidden{display:none!important}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:white;padding:13px 18px;border-radius:16px;z-index:20}.modal{position:fixed;inset:0;background:#0008;z-index:30;display:grid;place-items:center;padding:14px}.modal .box{max-height:86vh;overflow:auto;width:min(760px,100%)}pre{white-space:pre-wrap;overflow:auto;background:#0b1220;color:#e5e7eb;padding:14px;border-radius:14px;font-size:.82rem}.bottom{display:none}.conflict{border-left:5px solid var(--warn)}

@media(max-width:460px){.kpis{grid-template-columns:1fr!important}.actions .btn,.actions button{flex:1 1 100%}.box{width:100%}.brand h2{font-size:1.2rem}.logo{width:44px;height:44px}.main{padding-bottom:96px}}
</style></head><body><div id="auth" class="auth"><div class="box"><div class="brand"><div class="logo">☁️</div><div><h2>Teacher FileVault Pro</h2><p class="hint">Offline-first + Supabase Storage cloud sync</p></div></div><div id="setup"><div class="row"><label>Full name<input id="suName"></label><label>Staff ID<input id="suStaff"></label><label>Password/PIN<input id="suPass" type="password"></label><label>School level<select id="suLevel"><option value="basic">Basic School only (Term)</option><option value="shs">SHS only (Semester)</option><option value="both">Both Basic + SHS (Term & Semester)</option></select></label><button onclick="createAdmin()">Create Super Admin</button></div></div><div id="login" class="hidden"><div class="row"><label>Staff ID<input id="liStaff"></label><label>Password/PIN<input id="liPass" type="password"></label><button onclick="login()">Login</button></div></div></div></div><div id="app" class="app hidden"><div class="layout"><aside id="side" class="side"><div class="brand"><div class="logo">📚</div><div><b>FileVault</b><div class="hint">Cloud Sync Pro</div></div></div><hr><div id="nav" class="nav"></div></aside><main class="main"><div class="top"><div><button class="secondary hide-desk" onclick="document.getElementById('side').classList.toggle('open')">☰</button><h2 id="title">Dashboard</h2><div class="hint" id="crumb">Home</div></div><div class="actions"><button class="secondary" onclick="toggleTheme()">🌓</button><button class="danger" onclick="logout()">Lock</button></div></div><div id="content"></div></main></div><nav class="bottom"><button onclick="go('dashboard')"><b>🏠</b>Home</button><button onclick="go('files')"><b>📁</b>Files</button><button onclick="go('upload')"><b>⬆️</b>Upload</button><button onclick="go('sync')"><b>☁️</b>Sync</button><button onclick="go('settings')"><b>⚙️</b>More</button></nav></div><div id="toast" class="toast hidden"></div><div id="modal" class="modal hidden"></div><script>
const DB='tfv_cloud_pro_v1',VER=1,stores=['users','files','logs','settings','queue','conflicts'];let db,user,screen=localStorage.screen||'dashboard';const pages=['dashboard','files','upload','sync','logs','users','settings','help'];function $(id){return document.getElementById(id)}function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}function toast(m){$('toast').textContent=m;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),3000)}
function openDB(){return new Promise((ok,no)=>{let r=indexedDB.open(DB,VER);r.onupgradeneeded=e=>{db=e.target.result;stores.forEach(s=>!db.objectStoreNames.contains(s)&&db.createObjectStore(s,{keyPath:'id'}))};r.onsuccess=e=>{db=e.target.result;ok()};r.onerror=()=>no(r.error)})}function tx(s,m='readonly'){return db.transaction(s,m).objectStore(s)}function put(s,o){return new Promise((ok,no)=>{o.updatedAt=o.updatedAt||new Date().toISOString();let r=tx(s,'readwrite').put(o);r.onsuccess=()=>ok(o);r.onerror=()=>no(r.error)})}function del(s,id){return new Promise((ok,no)=>{let r=tx(s,'readwrite').delete(id);r.onsuccess=ok;r.onerror=()=>no(r.error)})}function all(s){return new Promise((ok,no)=>{let r=tx(s).getAll();r.onsuccess=()=>ok(r.result||[]);r.onerror=()=>no(r.error)})}async function setting(k){return (await all('settings')).find(x=>x.id===k)?.value}async function setSetting(k,v){await put('settings',{id:k,value:v})}
async function init(){await openDB();document.body.classList.toggle('dark',localStorage.theme==='dark');let u=await all('users');$('setup').classList.toggle('hidden',u.length);$('login').classList.toggle('hidden',!u.length);let sid=localStorage.session;if(sid){user=u.find(x=>x.id===sid);if(user)showApp()}}async function createAdmin(){if(!suName.value||!suStaff.value||suPass.value.length<4)return toast('Enter name, staff ID and PIN/password.');await put('users',{id:uid(),name:suName.value,staff:suStaff.value,pass:btoa(suPass.value),role:'Super Admin',status:'Active'});await setSetting('schoolLevel',suLevel.value);await setSetting('periodLabel',suLevel.value==='shs'?'Semester':'Term');toast('Super Admin created. Login now.');location.reload()}async function login(){let u=(await all('users')).find(x=>x.staff===liStaff.value);if(!u||u.pass!==btoa(liPass.value))return toast('Wrong login details.');user=u;localStorage.session=u.id;await log('Logged in');showApp()}function showApp(){$('auth').classList.add('hidden');$('app').classList.remove('hidden');render()}function logout(){localStorage.removeItem('session');location.reload()}function toggleTheme(){localStorage.theme=localStorage.theme==='dark'?'light':'dark';document.body.classList.toggle('dark')}
function go(p){screen=p;localStorage.screen=p;side.classList.remove('open');render()}function nav(){const navEl=$('nav');navEl.innerHTML=pages.map(p=>'<button class="'+(screen===p?'good':'secondary')+'" onclick="go(\''+p+'\')">'+({dashboard:'🏠 Dashboard',files:'📁 My Files',upload:'⬆️ Upload',sync:'☁️ Cloud Sync',logs:'📜 Activity Logs',users:'👥 Users',settings:'⚙️ Settings',help:'❔ Help'}[p])+'</button>').join('')}async function render(){nav();title.textContent={dashboard:'Dashboard',files:'My Files',upload:'Upload Files',sync:'Cloud Sync Pro',logs:'Activity Logs',users:'Users',settings:'Settings',help:'Help'}[screen];crumb.textContent='Home / '+title.textContent;await ({dashboard,files,upload,sync,logs,users,settings,help}[screen]||dashboard)()}
async function getSchoolLevel(){return await setting('schoolLevel')||'basic'}function levelName(v){return v==='shs'?'SHS':v==='both'?'Basic + SHS':'Basic School'}function periodForLevel(v){return v==='shs'?'Semester':'Term'}function periodOptionsFor(v){let p=periodForLevel(v);return '<option>'+p+' 1</option><option>'+p+' 2</option><option>'+p+' 3</option>'}async function getPeriodLabel(){let v=await getSchoolLevel();return v==='both'?'Term / Semester':periodForLevel(v)}async function setSchoolLevel(v){await setSetting('schoolLevel',v);await setSetting('periodLabel',v==='both'?'Term / Semester':periodForLevel(v))}function updatePeriodChoices(){let lv=document.getElementById('fileLevel')?.value||'basic',p=periodForLevel(lv),sel=document.getElementById('term');if(document.getElementById('periodLabelText'))document.getElementById('periodLabelText').textContent=p;if(sel)sel.innerHTML=periodOptionsFor(lv)}function fmt(n){return n>1048576?(n/1048576).toFixed(1)+' MB':n>1024?(n/1024).toFixed(1)+' KB':(n||0)+' B'}function fileIcon(t=''){return t.includes('pdf')?'📕':t.includes('image')?'🖼️':t.includes('word')?'📝':t.includes('excel')||t.includes('sheet')?'📊':t.includes('video')?'🎬':'📄'}async function dashboard(){let f=await all('files'),q=await all('queue'),c=await all('conflicts'),used=f.reduce((a,b)=>a+(b.size||0),0),cfg=await cfgSync();content.innerHTML='<div class="grid kpis"><div class="card" style="padding:18px"><span class="hint">Files</span><h1>'+f.length+'</h1></div><div class="card" style="padding:18px"><span class="hint">Storage</span><h1>'+fmt(used)+'</h1></div><div class="card" style="padding:18px"><span class="hint">Queue</span><h1>'+q.filter(x=>x.status!=='done').length+'</h1></div><div class="card" style="padding:18px"><span class="hint">Conflicts</span><h1>'+c.length+'</h1></div></div><div class="card" style="padding:18px;margin-top:14px"><h3>Cloud Sync Status</h3><p class="hint">Setup: '+esc(levelName(await getSchoolLevel())+' • '+(await getPeriodLabel())+' mode')+'<br>'+(ready(cfg)?'Enabled. Last sync: '+esc(cfg.lastSync||'Never'):'Not configured. Open Cloud Sync to connect Supabase Storage.')+'</p><div class="actions"><button onclick="go(\'upload\')">Upload File</button><button class="secondary" onclick="go(\'sync\')">Open Sync</button><button class="good" onclick="syncNow()">Sync Now</button></div></div><div class="card" style="padding:18px;margin-top:14px"><h3>Recent Files</h3><div class="grid">'+(f.slice(-6).reverse().map(cardFile).join('')||'<p class="hint">No files uploaded yet.</p>')+'</div></div>'}
function cardFile(x){let lv=x.schoolLevel||x.level||'basic',pl=x.periodLabel||periodForLevel(lv),pv=x.periodValue||x.term||'';return '<div class="file card" style="padding:12px"><div class="ico">'+fileIcon(x.type)+'</div><div style="flex:1"><b>'+esc(x.title)+'</b><div class="hint">'+esc(levelName(lv))+' • '+esc(pl)+' '+esc(String(pv).replace(pl,'').trim()||pv)+' • '+esc(x.category||'Document')+' • '+fmt(x.size)+' • '+(x.cloudPath?'☁️ Cloud':'📱 Local')+'</div><div class="actions"><button class="secondary" onclick="downloadFile(\''+x.id+'\')">Download</button><button class="danger" onclick="removeFile(\''+x.id+'\')">Delete</button></div></div></div>'}async function files(){let f=await all('files'),mode=await getSchoolLevel();content.innerHTML='<div class="card" style="padding:14px"><div class="grid cols mobile-form"><input id="q" oninput="filterFiles()" placeholder="Search by title, tag, subject, class..."><select id="levelFilter" onchange="filterFiles()"><option value="">All Levels</option><option value="basic">Basic School</option><option value="shs">SHS</option></select></div><p class="hint">Mode: '+esc(levelName(mode))+' • Basic uses Term, SHS uses Semester.</p></div><div id="fileList" class="grid" style="margin-top:14px">'+(f.map(cardFile).join('')||'<p class="hint">No files found.</p>')+'</div>'}async function filterFiles(){let q=$('q').value.toLowerCase(),lv=$('levelFilter')?.value||'',f=(await all('files')).filter(x=>JSON.stringify(x).toLowerCase().includes(q)&&(!lv||(x.schoolLevel||x.level||'basic')===lv));fileList.innerHTML=f.map(cardFile).join('')||'<p class="hint">No match found.</p>'}
async function upload(){let mode=await getSchoolLevel();let defaultLevel=mode==='both'?'basic':mode;let pl=periodForLevel(defaultLevel);let levelControl=mode==='both'?'<label>School Level<select id="fileLevel" onchange="updatePeriodChoices()"><option value="basic">Basic School - Term</option><option value="shs">SHS - Semester</option></select></label>':'<label>School Level<input id="fileLevelDisplay" value="'+esc(levelName(defaultLevel))+'" disabled></label>';content.innerHTML='<div class="card mobile-upload-card" style="padding:18px"><h3>Upload Teaching Files</h3><p class="hint">Current setup: <b>'+esc(levelName(mode))+'</b>. Basic records use <b>Term</b>; SHS records use <b>Semester</b>.</p><div class="drop"><input id="upFiles" type="file" multiple><p class="hint">Choose PDFs, Word, Excel, PowerPoint, images, videos or any document.</p></div><div class="grid cols mobile-form">'+levelControl+'<label>Category<input id="cat" placeholder="Lesson Notes"></label><label>Subject<input id="sub" placeholder="ICT"></label><label>Class/Form<input id="cls" placeholder="'+(defaultLevel==='shs'?'SHS 1':'Basic 7')+'"></label><label><span id="periodLabelText">'+pl+'</span><select id="term">'+periodOptionsFor(defaultLevel)+'</select></label><label class="cols">Tags<input id="tags" placeholder="exam, lesson, week 2"></label></div><br><button class="wide-mobile" onclick="saveUploads()">Save Uploads</button></div>'}async function saveUploads(){let fs=[...upFiles.files];if(!fs.length)return toast('Choose file(s).');let mode=await getSchoolLevel();let lv=mode==='both'?fileLevel.value:mode;let pl=periodForLevel(lv);for(const file of fs){let obj={id:uid(),title:file.name,type:file.type,size:file.size,blob:file,category:cat.value,subject:sub.value,className:cls.value,schoolLevel:lv,periodLabel:pl,periodValue:term.value,term:term.value,tags:tags.value,owner:user.id,createdAt:new Date().toISOString()};await put('files',obj);await enqueue('files',obj.id,'upsert',obj)}await log('Uploaded '+fs.length+' file(s) for '+levelName(lv)+' '+pl);toast('Files saved locally and queued for cloud sync.');go('files')}async function downloadFile(id){let f=(await all('files')).find(x=>x.id===id);if(!f)return;if(!f.blob&&f.cloudPath){let cfg=await cfgSync();f.blob=await storageDownload(cfg,f.cloudPath,f.type);await put('files',f)}let a=document.createElement('a');a.href=URL.createObjectURL(f.blob);a.download=f.title;a.click()}async function removeFile(id){if(!confirm('Move this file out of the vault?'))return;let f=(await all('files')).find(x=>x.id===id);await del('files',id);await enqueue('files',id,'delete',f||{id});await log('Deleted file');toast('Deleted locally and queued for cloud delete.');render()}
async function logs(){let l=await all('logs');content.innerHTML='<div class="timeline">'+(l.reverse().map(x=>'<div class="log"><div class="badge">📜</div><div><b>'+esc(x.action)+'</b><div class="hint">'+esc(x.date)+' • '+esc(x.user||'System')+'</div></div></div>').join('')||'<p class="hint">No activity yet.</p>')+'</div>'}async function log(action){await put('logs',{id:uid(),action,date:new Date().toLocaleString(),user:user?.name||'System'});let cfg=await cfgSync();if(ready(cfg))await enqueue('logs',uid(),'upsert',{id:uid(),action,date:new Date().toISOString(),user:user?.name||'System'})}
async function users(){let u=await all('users');content.innerHTML='<div class="card" style="padding:18px"><h3>Add User</h3><div class="grid cols"><input id="un" placeholder="Full name"><input id="us" placeholder="Staff ID"><input id="up" placeholder="Password/PIN"><select id="ur"><option>Teacher</option><option>Admin</option><option>Viewer</option></select></div><br><button onclick="addUser()">Add User</button></div><div class="grid" style="margin-top:14px">'+u.map(x=>'<div class="card" style="padding:14px"><b>'+esc(x.name)+'</b><div class="hint">'+esc(x.staff)+' • '+esc(x.role)+'</div></div>').join('')+'</div>'}async function addUser(){if(!un.value||!us.value||!up.value)return toast('Complete all user fields.');await put('users',{id:uid(),name:un.value,staff:us.value,pass:btoa(up.value),role:ur.value,status:'Active'});await log('Created user '+un.value);render()}
async function settings(){let level=await getSchoolLevel();let pl=await getPeriodLabel();content.innerHTML='<div class="card settings-card" style="padding:18px"><h3>School Level Setup</h3><p class="hint">Select how your school operates. <b>Basic School</b> uses Terms, <b>SHS</b> uses Semesters, and <b>Both</b> lets you choose Basic or SHS during each upload.</p><div class="grid cols mobile-form"><label>School Name<input id="school" value="'+esc(await setting('school')||'')+'"></label><label>School Type<select id="schoolLevel"><option value="basic" '+(level==='basic'?'selected':'')+'>Basic School only - Term</option><option value="shs" '+(level==='shs'?'selected':'')+'>SHS only - Semester</option><option value="both" '+(level==='both'?'selected':'')+'>Both Basic + SHS - Term & Semester</option></select></label><label>Active Period System<input value="'+esc(pl)+'" disabled></label></div><div class="card" style="padding:14px;margin-top:14px"><b>How the app will behave</b><p class="hint">Basic files will be saved with <b>school_level = basic</b>, <b>period_label = Term</b>. SHS files will be saved with <b>school_level = shs</b>, <b>period_label = Semester</b>. These values also sync to Supabase.</p></div><br><div class="actions mobile-actions"><button onclick="saveSchoolSetup()">Save Setup</button><button class="danger" onclick="resetApp()">Reset Local Data</button></div></div>'}async function saveSchoolSetup(){await setSetting('school',school.value);await setSchoolLevel(schoolLevel.value);toast('Setup saved. '+levelName(schoolLevel.value)+' mode is active.');render()}function resetApp(){if(prompt('Type RESET')==='RESET'){indexedDB.deleteDatabase(DB);localStorage.clear();location.reload()}}function help(){content.innerHTML='<div class="card" style="padding:18px"><h3>Guide</h3><ol class="hint"><li>Create your Supabase project.</li><li>Open Sync page and copy the SQL.</li><li>Run it in Supabase SQL Editor.</li><li>Paste Project URL and anon public key.</li><li>Enable Auto Sync. Uploads will save locally first, then upload to Supabase Storage.</li></ol></div>'}
async function cfgSync(){let c=await setting('sync');c=typeof c==='string'?JSON.parse(c||'{}'):(c||{});c.schoolId=c.schoolId||'school_'+uid();c.table=c.table||'teacher_filevault_sync';c.bucket=c.bucket||'teacher-filevault-files';c.device=c.device||'dev_'+uid();c.conflict=c.conflict||'newest';return c}async function saveCfg(c){await setSetting('sync',JSON.stringify(c))}function ready(c){return c.enabled&&c.url&&c.key&&c.schoolId}function root(c){return String(c.url||'').replace(/\/$/,'')}function h(c,prefer){let x={apikey:c.key,Authorization:'Bearer '+c.key,'Content-Type':'application/json'};if(prefer)x.Prefer=prefer;return x}function rest(c){return root(c)+'/rest/v1/'+c.table}function objBase(c){return root(c)+'/storage/v1/object/'+encodeURIComponent(c.bucket)}
async function enqueue(store,recordId,op,payload){let c=await cfgSync();if(!ready(c))return;await put('queue',{id:uid(),store,recordId,op,payload:plain(payload),status:'pending',attempts:0,createdAt:new Date().toISOString()});if(c.auto)schedule()}function plain(o){let p={...(o||{})};delete p.blob;return p}function schedule(){clearTimeout(window.st);window.st=setTimeout(processQueue,1500)}function pathFor(c,f){return c.schoolId+'/'+(f.owner||'user')+'/'+f.id+'_'+(f.title||'file').replace(/[^a-z0-9._-]/gi,'_')}async function storageUpload(c,f){if(!(f.blob instanceof Blob))return f.cloudPath||'';let path=f.cloudPath||pathFor(c,f),url=objBase(c)+'/'+path.split('/').map(encodeURIComponent).join('/');let r=await fetch(url,{method:'POST',headers:{apikey:c.key,Authorization:'Bearer '+c.key,'Content-Type':f.blob.type||'application/octet-stream','x-upsert':'true'},body:f.blob});if(!r.ok)throw Error(await r.text());return path}async function storageDownload(c,path,type){let r=await fetch(objBase(c)+'/'+path.split('/').map(encodeURIComponent).join('/'),{headers:{apikey:c.key,Authorization:'Bearer '+c.key}});if(!r.ok)throw Error(await r.text());return await r.blob()}async function row(c,store,rec,deleted=false){let data=plain(rec);if(store==='files'&&!deleted){data.cloudPath=await storageUpload(c,rec);data.cloudSynced=true}return {id:c.schoolId+'__'+store+'__'+rec.id,school_id:c.schoolId,store,record_id:rec.id,data,deleted,updated_at:new Date().toISOString(),device_id:c.device,school_level:data.schoolLevel||data.school_level||null,period_label:data.periodLabel||data.period_label||null,period_value:data.periodValue||data.period_value||data.term||null}}
async function processQueue(){let c=await cfgSync();if(!ready(c)||!navigator.onLine)return;let q=(await all('queue')).filter(x=>x.status!=='done');for(const item of q){try{let rec=item.payload;if(item.op==='upsert'&&item.store==='files')rec=(await all('files')).find(x=>x.id===item.recordId)||rec;let rr=await row(c,item.store,rec,item.op==='delete');let r=await fetch(rest(c),{method:'POST',headers:h(c,'resolution=merge-duplicates'),body:JSON.stringify([rr])});if(!r.ok)throw Error(await r.text());item.status='done';item.syncedAt=new Date().toISOString();await put('queue',item)}catch(e){item.status='failed';item.attempts=(item.attempts||0)+1;item.lastError=e.message;await put('queue',item);break}}await pullCloud(false)}async function pushAll(){let c=await cfgSync();if(!ready(c))return toast('Complete sync settings first.');let rows=[];for(const s of ['users','files','logs'])for(const x of await all(s))rows.push(await row(c,s,x,false));for(let i=0;i<rows.length;i+=40){let r=await fetch(rest(c),{method:'POST',headers:h(c,'resolution=merge-duplicates'),body:JSON.stringify(rows.slice(i,i+40))});if(!r.ok)throw Error(await r.text())}c.lastSync=new Date().toISOString();await saveCfg(c);toast('All data and files pushed to cloud.');render()}async function pullCloud(ask=true){let c=await cfgSync();if(!ready(c))return toast('Complete sync settings first.');let r=await fetch(rest(c)+'?school_id=eq.'+encodeURIComponent(c.schoolId)+'&select=*',{headers:h(c)});if(!r.ok)throw Error(await r.text());let rows=await r.json();if(ask&&!confirm('Pull '+rows.length+' cloud records?'))return;for(const rw of rows){let local=(await all(rw.store)).find(x=>x.id===rw.record_id);if(rw.deleted){await del(rw.store,rw.record_id);continue}let cloud=rw.data||{};if(local&&local.updatedAt&&rw.device_id!==c.device&&new Date(local.updatedAt)>new Date(c.lastSync||0)){await put('conflicts',{id:uid(),store:rw.store,recordId:rw.record_id,local:plain(local),cloud,createdAt:new Date().toISOString()});if(c.conflict==='local')continue}if(rw.store==='files'&&cloud.cloudPath){try{cloud.blob=await storageDownload(c,cloud.cloudPath,cloud.type)}catch(e){cloud.downloadError=e.message}}await put(rw.store,cloud)}c.lastSync=new Date().toISOString();await saveCfg(c);if(ask)toast('Cloud pulled to this device.');if(screen==='sync')render()}async function syncNow(){try{await processQueue();await pushAll();await pullCloud(false);toast('Sync complete.')}catch(e){console.error(e);toast('Sync failed: '+e.message)}}async function resolveConflict(id,choice){let c=(await all('conflicts')).find(x=>x.id===id);if(!c)return;await put(c.store,choice==='local'?c.local:c.cloud);await del('conflicts',id);toast('Conflict resolved');render()}
function sql(){return `-- Teacher FileVault Cloud Sync Pro SQL
-- Supports Basic School (Term), SHS (Semester), and Both modes.

create table if not exists public.teacher_filevault_sync (
  id text primary key,
  school_id text not null,
  store text not null,
  record_id text not null,
  data jsonb not null default '{}'::jsonb,
  deleted boolean default false,
  updated_at timestamptz default now(),
  device_id text,
  school_level text,
  period_label text,
  period_value text
);

alter table public.teacher_filevault_sync
add column if not exists id text,
add column if not exists school_id text,
add column if not exists store text,
add column if not exists record_id text,
add column if not exists data jsonb default '{}'::jsonb,
add column if not exists deleted boolean default false,
add column if not exists updated_at timestamptz default now(),
add column if not exists device_id text,
add column if not exists school_level text,
add column if not exists period_label text,
add column if not exists period_value text;

alter table public.teacher_filevault_sync
alter column id type text using id::text,
alter column record_id type text using record_id::text;

create index if not exists teacher_filevault_sync_school_idx on public.teacher_filevault_sync (school_id, store, record_id);
create index if not exists teacher_filevault_sync_level_period_idx on public.teacher_filevault_sync (school_level, period_label, period_value);

alter table public.teacher_filevault_sync enable row level security;

drop policy if exists "Teacher FileVault read metadata" on public.teacher_filevault_sync;
drop policy if exists "Teacher FileVault insert metadata" on public.teacher_filevault_sync;
drop policy if exists "Teacher FileVault update metadata" on public.teacher_filevault_sync;

create policy "Teacher FileVault read metadata" on public.teacher_filevault_sync for select to anon using (true);
create policy "Teacher FileVault insert metadata" on public.teacher_filevault_sync for insert to anon with check (true);
create policy "Teacher FileVault update metadata" on public.teacher_filevault_sync for update to anon using (true) with check (true);

insert into storage.buckets (id,name,public,file_size_limit)
values ('teacher-filevault-files','teacher-filevault-files',false,52428800)
on conflict (id) do update set public=false,file_size_limit=52428800;

drop policy if exists "Teacher FileVault read files" on storage.objects;
drop policy if exists "Teacher FileVault upload files" on storage.objects;
drop policy if exists "Teacher FileVault update files" on storage.objects;
drop policy if exists "Teacher FileVault delete files" on storage.objects;

create policy "Teacher FileVault read files" on storage.objects for select to anon using (bucket_id='teacher-filevault-files');
create policy "Teacher FileVault upload files" on storage.objects for insert to anon with check (bucket_id='teacher-filevault-files');
create policy "Teacher FileVault update files" on storage.objects for update to anon using (bucket_id='teacher-filevault-files') with check (bucket_id='teacher-filevault-files');
create policy "Teacher FileVault delete files" on storage.objects for delete to anon using (bucket_id='teacher-filevault-files');

notify pgrst, 'reload schema';`}
async function sync(){let c=await cfgSync(),q=await all('queue'),cf=await all('conflicts');content.innerHTML='<div class="card" style="padding:18px"><h3>Supabase Cloud Storage Sync</h3><p class="hint">Real files upload to Supabase Storage. Metadata syncs to Supabase Database. Offline changes enter queue and retry automatically.</p><div class="grid kpis"><div><b>Status</b><h2>'+(ready(c)?'Ready':'Setup')+'</h2></div><div><b>Queue</b><h2>'+q.filter(x=>x.status!=='done').length+'</h2></div><div><b>Conflicts</b><h2>'+cf.length+'</h2></div><div><b>Last Sync</b><p>'+esc(c.lastSync||'Never')+'</p></div></div></div><div class="card" style="padding:18px;margin-top:14px"><div class="grid cols"><label>Enable<select id="en"><option value="">No</option><option value="1" '+(c.enabled?'selected':'')+'>Yes</option></select></label><label>Auto Sync<select id="auto"><option value="">Manual</option><option value="1" '+(c.auto?'selected':'')+'>Background</option></select></label><label>School Sync ID<input id="sid" value="'+esc(c.schoolId)+'"></label><label>Conflict Rule<select id="conf"><option value="newest">Newest/cloud</option><option value="local" '+(c.conflict==='local'?'selected':'')+'>Local wins</option></select></label><label>Project URL<input id="url" value="'+esc(c.url||'')+'"></label><label>Anon Key<textarea id="key">'+esc(c.key||'')+'</textarea></label><label>Table<input id="tab" value="'+esc(c.table)+'"></label><label>Bucket<input id="buck" value="'+esc(c.bucket)+'"></label></div><br><div class="actions"><button onclick="saveSync()">Save</button><button class="good" onclick="syncNow()">Sync Now</button><button class="secondary" onclick="pushAll()">Push All</button><button class="secondary" onclick="pullCloud(true)">Pull Cloud</button><button class="warn" onclick="processQueue()">Retry Queue</button><button class="secondary" onclick="showSQL()">Show SQL</button></div></div><div class="grid cols" style="margin-top:14px"><div class="card" style="padding:18px"><h3>Offline Queue</h3><div class="timeline">'+(q.slice(-10).reverse().map(x=>'<div class="log"><div class="badge">'+(x.status==='done'?'✅':x.status==='failed'?'⚠️':'⏳')+'</div><div><b>'+x.op+' '+x.store+'</b><div class="hint">'+x.status+' • attempts '+(x.attempts||0)+'</div><div class="hint">'+esc(x.lastError||'')+'</div></div></div>').join('')||'<p class="hint">No queue.</p>')+'</div></div><div class="card" style="padding:18px"><h3>Conflicts</h3>'+(cf.map(x=>'<div class="log conflict"><div class="badge">⚖️</div><div><b>'+x.store+'</b><p class="hint">Local and cloud both changed.</p><button onclick="resolveConflict(\''+x.id+'\',\'local\')">Keep Local</button> <button class="secondary" onclick="resolveConflict(\''+x.id+'\',\'cloud\')">Keep Cloud</button></div></div>').join('')||'<p class="hint">No conflicts.</p>')+'</div></div>'}async function saveSync(){let c=await cfgSync();Object.assign(c,{enabled:!!en.value,auto:!!auto.value,schoolId:sid.value,url:url.value,key:key.value,table:tab.value,bucket:buck.value,conflict:conf.value});await saveCfg(c);toast('Sync settings saved');if(c.auto)schedule();render()}function showSQL(){$('modal').classList.remove('hidden');$('modal').innerHTML='<div class="box"><h3>SQL for Supabase</h3><pre>'+esc(sql())+'</pre><button onclick="modal.classList.add(\'hidden\')">Close</button></div>'}
window.addEventListener('online',processQueue);setInterval(async()=>{let c=await cfgSync();if(c.auto&&ready(c))processQueue()},180000);init();
</script></body></html>
