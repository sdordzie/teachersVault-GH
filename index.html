<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Teacher FileVault Enterprise Secure Online License</title>
<style>
:root{--bg:#f6f8fc;--panel:#fff;--panel2:#f8fafc;--text:#0f172a;--mut:#64748b;--line:#dbe4f0;--pri:#2563eb;--pri2:#1d4ed8;--ok:#16a34a;--warn:#d97706;--bad:#dc2626;--shadow:0 18px 45px #0f172a18;--r:22px}body.dark{--bg:#07101f;--panel:#0e1728;--panel2:#111d32;--text:#eef4ff;--mut:#9fb0ca;--line:#26364f;--shadow:0 18px 50px #0008}*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,Segoe UI,Arial,sans-serif;background:radial-gradient(circle at top left,#dbeafe55,transparent 34%),var(--bg);color:var(--text)}button,input,select,textarea{font:inherit}button,.btn{border:0;border-radius:16px;padding:12px 15px;background:linear-gradient(135deg,var(--pri),var(--pri2));color:white;font-weight:850;cursor:pointer;box-shadow:0 8px 20px #2563eb25;min-height:44px}.secondary{background:var(--panel2);color:var(--text);border:1px solid var(--line);box-shadow:none}.good{background:linear-gradient(135deg,#16a34a,#15803d)}.danger{background:linear-gradient(135deg,#dc2626,#991b1b)}.warn{background:linear-gradient(135deg,#f59e0b,#b45309)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:16px;padding:13px;background:var(--panel);color:var(--text);outline:none}input:focus,select:focus,textarea:focus{border-color:var(--pri);box-shadow:0 0 0 4px #2563eb22}label{font-weight:850;font-size:.9rem}.hint,.mut{color:var(--mut);font-size:.92rem}.hidden{display:none!important}.auth{min-height:100vh;display:grid;place-items:center;padding:18px}.box,.card,.metric{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}.box{width:min(500px,100%);padding:24px}.brand{display:flex;align-items:center;gap:13px}.logo{width:56px;height:56px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,#2563eb,#f59e0b);color:white;font-size:27px}.layout{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{position:sticky;top:0;height:100vh;overflow:auto;padding:18px;background:var(--panel);border-right:1px solid var(--line);z-index:12}.nav{display:grid;gap:7px;margin-top:14px}.nav button{width:100%;text-align:left;background:transparent;color:var(--mut);box-shadow:none;border:1px solid transparent;justify-content:flex-start}.nav button.active{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;border-color:#60a5fa44}.main{padding:18px 18px 96px;min-width:0}.top{position:sticky;top:0;z-index:7;margin:-18px -18px 16px;padding:16px 18px;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}.grid{display:grid;gap:14px}.cols{grid-template-columns:repeat(2,minmax(0,1fr))}.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}.enterprise-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px}.metric{padding:16px}.metric h1{margin:.2rem 0;font-size:2rem}.metric h1,.metric h2,.metric h3,.metric p{max-width:100%;overflow-wrap:anywhere;word-break:normal}.metric h2{font-size:clamp(1.05rem,2.2vw,1.45rem);line-height:1.15;margin:.35rem 0}.metric .sync-time{display:block;font-weight:900;font-size:clamp(1rem,2vw,1.25rem);line-height:1.2;white-space:normal}.metric .sync-sub{display:block;margin-top:6px;color:var(--mut);font-size:.82rem}.hero{display:grid;grid-template-columns:1.4fr .8fr;gap:14px}.hero-card{padding:20px;border-radius:28px;background:linear-gradient(135deg,var(--panel),var(--panel2));border:1px solid var(--line);box-shadow:var(--shadow)}.hero h1{font-size:clamp(1.6rem,4vw,3rem);line-height:1.05;margin:12px 0}.actions{display:flex;gap:9px;flex-wrap:wrap}.chip,.pill{display:inline-flex;align-items:center;gap:5px;padding:7px 10px;border-radius:999px;background:#dbeafe;color:#1e40af;font-weight:800;font-size:.82rem}body.dark .chip,body.dark .pill{background:#1e3a8a55;color:#bfdbfe}.file{display:flex;gap:12px;align-items:flex-start}.ico{width:48px;height:48px;border-radius:16px;display:grid;place-items:center;background:#dbeafe;font-size:1.4rem}.drop{border:2px dashed #93c5fd;border-radius:24px;padding:22px;text-align:center;background:#eff6ff33}.timeline{display:grid;gap:10px}.log{display:flex;gap:10px;padding:12px;border:1px solid var(--line);border-radius:18px;background:var(--panel)}.badge{width:40px;height:40px;border-radius:14px;display:grid;place-items:center;background:#eef2ff}.progress{height:10px;background:#e2e8f0;border-radius:99px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,#2563eb,#16a34a)}.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#111827;color:white;padding:14px 18px;border-radius:16px;z-index:50;box-shadow:0 18px 40px #0006}.modal{position:fixed;inset:0;background:#0009;z-index:60;display:grid;place-items:center;padding:14px}.modal .box{max-height:88vh;overflow:auto;width:min(850px,100%)}pre{white-space:pre-wrap;overflow:auto;background:#07101f;color:#e5e7eb;padding:14px;border-radius:14px}.bottom{display:none}.fab{position:fixed;right:18px;bottom:86px;width:58px;height:58px;border-radius:22px;font-size:1.7rem;z-index:8}.tip{position:relative}.tip:after{content:attr(data-tip);position:absolute;left:50%;bottom:calc(100% + 8px);transform:translateX(-50%);min-width:210px;max-width:260px;background:#020617;color:white;padding:9px 11px;border-radius:12px;font-size:.78rem;line-height:1.35;box-shadow:0 12px 30px #0007;opacity:0;pointer-events:none;transition:.15s}.tip:hover:after,.tip:focus:after{opacity:1}.menuBtn{display:none}.tablewrap{overflow:auto;border:1px solid var(--line);border-radius:18px}table{width:100%;border-collapse:collapse;min-width:680px}th,td{padding:12px;border-bottom:1px solid var(--line);text-align:left}th{color:var(--mut);font-size:.85rem}.mobile-cards{display:none}@media(max-width:1100px){.enterprise-grid{grid-template-columns:repeat(3,1fr)}.kpis{grid-template-columns:repeat(2,1fr)}.hero{grid-template-columns:1fr}}@media(max-width:820px){.layout{display:block}.menuBtn{display:inline-grid}.side{position:fixed;inset:0 22% 0 0;transform:translateX(-110%);transition:.25s;box-shadow:0 0 0 999px #0000}.side.open{transform:none;box-shadow:0 0 0 999px #0007}.main{padding:12px 12px 96px}.top{margin:-12px -12px 14px;padding:12px}.top h2{font-size:1.18rem;margin:.2rem 0}.cols,.kpis,.enterprise-grid{grid-template-columns:1fr 1fr}.hero-card,.card,.metric{border-radius:20px;padding:14px!important}.actions button{flex:1 1 44%}.bottom{display:grid;grid-template-columns:repeat(5,1fr);position:fixed;left:8px;right:8px;bottom:8px;background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:6px;z-index:20;box-shadow:var(--shadow)}.bottom button{background:transparent;color:var(--mut);box-shadow:none;padding:7px 3px;font-size:.72rem}.bottom button b{display:block;font-size:1.25rem}.hideMobile{display:none}.tablewrap{display:none}.mobile-cards{display:grid}}@media(max-width:520px){.cols,.kpis,.enterprise-grid{grid-template-columns:1fr}.box{padding:18px}.brand h2{font-size:1.2rem}.file{align-items:center}.actions button{flex:1 1 100%}.tip:after{display:none}.side{inset:0 12% 0 0}}

.license-hero{display:grid;grid-template-columns:1.15fr .85fr;gap:16px;align-items:stretch}.license-status{padding:18px;border-radius:22px;background:linear-gradient(135deg,#0f172a,#1e3a8a);color:white;box-shadow:var(--shadow)}.license-status.ok{background:linear-gradient(135deg,#064e3b,#16a34a)}.license-status.bad{background:linear-gradient(135deg,#7f1d1d,#dc2626)}.license-kv{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.license-kv div{padding:12px;border:1px solid var(--line);border-radius:16px;background:var(--panel2)}.codebox{white-space:pre-wrap;overflow:auto;background:#020817;color:#dbeafe;padding:14px;border-radius:16px;border:1px solid var(--line);max-height:280px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.82rem}.lockscreen{min-height:58vh;display:grid;place-items:center;text-align:center}.lockscreen .card{max-width:760px}.gate-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;font-weight:900;background:#fef3c7;color:#92400e}.dark .gate-pill{background:#451a03;color:#fde68a}@media(max-width:820px){.license-hero{grid-template-columns:1fr}.license-kv{grid-template-columns:1fr}.license-status{border-radius:18px}.codebox{font-size:.74rem}.gate-pill{width:100%;justify-content:center}.nav button.locked{opacity:.5;filter:grayscale(.4)}}


/* === PROFESSIONAL LIGHT/DARK FIX: License status metric cards === */

  background:rgba(255,255,255,.14);

</style></head><body>
<div id="auth" class="auth"><div class="box"><div class="brand"><div class="logo">📚</div><div><h2>Teacher FileVault Enterprise</h2><p class="hint">Offline-first teacher file management with optional Supabase cloud sync.</p></div></div><hr><div id="setup"><h3>First-time setup</h3><div class="grid"><label>School level<select id="suLevel"><option value="basic">Basic School - Term</option><option value="shs">SHS - Semester</option><option value="both">Basic + SHS</option></select></label><label>Full name<input id="suName" placeholder="Administrator name"></label><label>Staff ID<input id="suStaff" placeholder="admin"></label><label>Password/PIN<input id="suPass" type="password" placeholder="minimum 4 characters"></label><button onclick="createAdmin()">Create Super Admin</button></div></div><div id="login" class="hidden"><h3>Login</h3><div class="grid"><label>Staff ID<input id="liStaff"></label><label>Password/PIN<input id="liPass" type="password"></label><button onclick="login()">Login</button></div></div></div></div>
<div id="app" class="hidden"><div class="layout"><aside id="side" class="side"><div class="brand"><div class="logo">📚</div><div><b>FileVault</b><div class="hint">Enterprise</div></div></div><hr><div id="nav" class="nav"></div></aside><main class="main"><div class="top"><div><button class="secondary menuBtn" onclick="toggleSide()">☰</button><h2 id="title">Dashboard</h2><div class="hint" id="crumb">Home</div></div><div class="actions"><button class="secondary tip" data-tip="Switch between light and dark mode." onclick="toggleTheme()">🌓</button><button class="danger" onclick="logout()">Lock</button></div></div><div id="content"></div></main></div><nav class="bottom"><button onclick="go('dashboard')"><b>🏠</b>Home</button><button onclick="go('files')"><b>📁</b>Files</button><button onclick="go('upload')"><b>⬆️</b>Upload</button><button onclick="go('sync')"><b>☁️</b>Sync</button><button onclick="go('backup')"><b>💾</b>Backup</button></nav></div>
<div id="toast" class="toast hidden"></div><div id="modal" class="modal hidden"></div>
<script>
const DB='tfv_enterprise_fixed_v1', VER=1, STORES=['users','files','logs','settings','queue','conflicts'];let db,user,screen=localStorage.screen||'dashboard';
const pages=['dashboard','files','upload','sync','backup','analytics','reports','license','enterprise','logs','users','settings','help'];
let licenseState={ok:false,reason:'Not checked',payload:null,online:false};
const $=id=>document.getElementById(id); const val=id=>$(id)?.value||''; const now=()=>new Date().toISOString();
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function toast(m){$('toast').textContent=m;$('toast').classList.remove('hidden');setTimeout(()=>$('toast').classList.add('hidden'),3200)}
function openDB(){return new Promise((ok,no)=>{let r=indexedDB.open(DB,VER);r.onupgradeneeded=e=>{db=e.target.result;STORES.forEach(s=>{if(!db.objectStoreNames.contains(s))db.createObjectStore(s,{keyPath:'id'})})};r.onsuccess=e=>{db=e.target.result;ok()};r.onerror=()=>no(r.error)})}
function os(s,m='readonly'){return db.transaction(s,m).objectStore(s)}function put(s,o){return new Promise((ok,no)=>{o.updatedAt=o.updatedAt||now();let r=os(s,'readwrite').put(o);r.onsuccess=()=>ok(o);r.onerror=()=>no(r.error)})}function del(s,id){return new Promise((ok,no)=>{let r=os(s,'readwrite').delete(id);r.onsuccess=()=>ok();r.onerror=()=>no(r.error)})}function all(s){return new Promise((ok,no)=>{let r=os(s).getAll();r.onsuccess=()=>ok(r.result||[]);r.onerror=()=>no(r.error)})}
async function setting(k){return (await all('settings')).find(x=>x.id===k)?.value}async function setSetting(k,v){return put('settings',{id:k,value:v,updatedAt:now()})}
async function log(action,details=''){await put('logs',{id:uid(),action,details,user:user?.name||'System',date:new Date().toLocaleString(),createdAt:now()})}
function levelName(v){return v==='shs'?'SHS':v==='both'?'Basic + SHS':'Basic School'}function periodFor(v){return v==='shs'?'Semester':'Term'}function periodOptions(v){let p=periodFor(v);return `<option>${p} 1</option><option>${p} 2</option><option>${p} 3</option>`}
async function getLevel(){return await setting('schoolLevel')||'basic'}async function getPeriodLabel(){let v=await getLevel();return v==='both'?'Term / Semester':periodFor(v)}
async function init(){await openDB();document.body.classList.toggle('dark',localStorage.theme==='dark');let users=await all('users');$('setup').classList.toggle('hidden',users.length>0);$('login').classList.toggle('hidden',users.length===0);let sid=localStorage.session; if(sid){user=users.find(x=>x.id===sid);if(user)showApp()} }
async function createAdmin(){if(!val('suName')||!val('suStaff')||val('suPass').length<4)return toast('Complete setup fields.');await setSetting('schoolLevel',val('suLevel'));await put('users',{id:uid(),name:val('suName'),staff:val('suStaff'),pass:btoa(val('suPass')),role:'Super Admin',status:'Active',createdAt:now()});toast('Super Admin created. Login now.');location.reload()}
async function login(){let u=(await all('users')).find(x=>x.staff===val('liStaff'));if(!u||u.pass!==btoa(val('liPass')))return toast('Wrong login details.');user=u;localStorage.session=u.id;await log('Logged in');showApp()}function logout(){localStorage.removeItem('session');location.reload()}async function showApp(){$('auth').classList.add('hidden');$('app').classList.remove('hidden');await refreshLicenseState();if(!licenseState.ok && !['license','help'].includes(screen))screen='license';render()}function toggleTheme(){localStorage.theme=localStorage.theme==='dark'?'light':'dark';document.body.classList.toggle('dark')}function toggleSide(){$('side').classList.toggle('open')}async function go(p){if(!licenseState.ok && !['license','help'].includes(p)){screen='license';localStorage.screen='license';toast('Activate a valid enterprise license first.')}else{screen=p;localStorage.screen=p}$('side').classList.remove('open');render()}
function renderNav(){const names={dashboard:'🏠 Dashboard',files:'📁 My Files',upload:'⬆️ Upload',sync:'☁️ Cloud Sync',analytics:'📊 Analytics',reports:'🧾 Reports',backup:'💾 Backup & Restore',license:'🔐 License',enterprise:'🏢 Control',logs:'📜 Activity Logs',users:'👥 Users',settings:'⚙️ Settings',help:'📘 Guide'};$('nav').innerHTML=pages.map(p=>{let locked=!licenseState.ok&&!['license','help'].includes(p);return `<button class="${screen===p?'active':''} ${locked?'locked':''}" title="${locked?'License required':'Open '+names[p]}" onclick="go('${p}')">${locked?'🔒 ':''}${names[p]}</button>`}).join('')}
async function render(){renderNav();const titles={dashboard:'Dashboard',files:'My Files',upload:'Upload Files',sync:'Cloud Sync',analytics:'Analytics',reports:'Reports',backup:'Backup & Restore',license:'License & Activation',enterprise:'Enterprise Control',logs:'Activity Logs',users:'Users',settings:'Settings',help:'Usage Guide'};$('title').textContent=titles[screen]||'Dashboard';$('crumb').textContent='Home / '+$('title').textContent;if(!licenseState.ok && !['license','help'].includes(screen)) return licenseLockedView(); await (views[screen]||views.dashboard)()}
function fmt(n=0){return n>1048576?(n/1048576).toFixed(1)+' MB':n>1024?(n/1024).toFixed(1)+' KB':n+' B'}function formatDate(dateStr){if(!dateStr)return 'Never';let d=new Date(dateStr);if(isNaN(d.getTime()))return String(dateStr);return d.toLocaleString(undefined,{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}).replace(',', ' •');}function formatDateSub(dateStr){if(!dateStr)return 'Not synced yet';let d=new Date(dateStr);if(isNaN(d.getTime()))return 'Saved sync time';let diff=Date.now()-d.getTime(),m=Math.floor(diff/60000),h=Math.floor(m/60),days=Math.floor(h/24);if(m<1)return 'Just now';if(m<60)return m+' min ago';if(h<24)return h+' hr ago';return days+' day'+(days>1?'s':'')+' ago';}function icon(t=''){return t.includes('pdf')?'📕':t.includes('image')?'🖼️':t.includes('word')?'📝':t.includes('excel')||t.includes('sheet')?'📊':t.includes('video')?'🎬':t.includes('powerpoint')?'📽️':'📄'}
function cardFile(x){let lv=x.schoolLevel||'basic', pl=x.periodLabel||periodFor(lv), pv=x.periodValue||x.term||'';return `<div class="file card" style="padding:12px"><div class="ico">${icon(x.type)}</div><div style="flex:1;min-width:0"><b>${esc(x.title)}</b><div class="hint">${esc(levelName(lv))} • ${esc(pv)} • ${esc(x.category||'Document')} • ${fmt(x.size)} • ${x.cloudPath?'☁️ Cloud':'📱 Local'}</div><div class="actions"><button class="secondary" onclick="downloadFile('${x.id}')">Download</button><button class="danger" onclick="removeFile('${x.id}')">Delete</button></div></div></div>`}
async function dashboard(){let f=await all('files'), q=await all('queue'), c=await all('conflicts'), u=await all('users'), used=f.reduce((a,b)=>a+(b.size||0),0), cfg=await cfgSync(), lvl=await getLevel();let pct=Math.min(100,Math.round((used/(50*1024*1024))*100));$('content').innerHTML=`<section class="hero"><div class="hero-card"><span class="chip">🏢 Enterprise • ${esc(levelName(lvl))}</span><h1>Teacher file management with offline storage and cloud sync.</h1><p class="hint">Built for Basic and SHS workflows with ${esc(await getPeriodLabel())} awareness, reports, analytics, licensing and mobile-first controls.</p><div class="actions"><button class="tip" data-tip="Upload documents and queue for cloud sync." onclick="go('upload')">⬆️ Quick Upload</button><button class="secondary" onclick="go('reports')">🧾 Reports</button><button class="good" onclick="syncNow()">☁️ Sync Now</button></div></div><div class="hero-card"><h3>Deployment Readiness</h3><p class="hint">${ready(cfg)?'Cloud is configured.':'Cloud setup is not complete.'}</p><div class="progress"><span style="width:${pct}%"></span></div><p class="hint">Local storage used: ${fmt(used)} / 50 MB guide</p><span class="chip">Queue ${q.filter(x=>x.status!=='done').length}</span> <span class="chip">Conflicts ${c.length}</span></div></section><div class="enterprise-grid" style="margin-top:14px"><div class="metric"><span class="hint">Files</span><h1>${f.length}</h1></div><div class="metric"><span class="hint">Users</span><h1>${u.length}</h1></div><div class="metric"><span class="hint">Storage</span><h1>${fmt(used)}</h1></div><div class="metric"><span class="hint">Queue</span><h1>${q.filter(x=>x.status!=='done').length}</h1></div><div class="metric"><span class="hint">Conflicts</span><h1>${c.length}</h1></div><div class="metric"><span class="hint">Mode</span><h2>${esc(await getPeriodLabel())}</h2></div></div><div class="grid cols" style="margin-top:14px"><div class="card" style="padding:18px"><h3>Enterprise Quick Actions</h3><div class="actions"><button onclick="go('analytics')">📊 Analytics</button><button class="secondary" onclick="go('license')">🔐 Activate</button><button class="secondary" onclick="go('enterprise')">🏢 Control</button></div></div><div class="card" style="padding:18px"><h3>Recent Files</h3><div class="grid">${f.slice(-4).reverse().map(cardFile).join('')||'<p class="hint">No files uploaded yet.</p>'}</div></div></div><button class="fab" onclick="go('upload')">＋</button>`}
async function files(){let f=await all('files');$('content').innerHTML=`<div class="card" style="padding:14px"><div class="grid cols"><input id="q" oninput="filterFiles()" placeholder="Search title, tag, subject, class..."><select id="levelFilter" onchange="filterFiles()"><option value="">All Levels</option><option value="basic">Basic School</option><option value="shs">SHS</option></select></div></div><div id="fileList" class="grid" style="margin-top:14px">${f.map(cardFile).join('')||'<p class="hint">No files found.</p>'}</div>`}async function filterFiles(){let q=val('q').toLowerCase(),lv=val('levelFilter'),f=(await all('files')).filter(x=>JSON.stringify(x).toLowerCase().includes(q)&&(!lv||(x.schoolLevel||'basic')===lv));$('fileList').innerHTML=f.map(cardFile).join('')||'<p class="hint">No match found.</p>'}

_users||'—')}</div><div><b>Online</b><br>${licenseState.online?'Verified':'Local / Not verified'}</div></div></div></div><div class="grid cols" style="margin-top:14px"><div class="card" style="padding:18px"><h3>License Payload</h3><div class="codebox">${esc(p.license_id?JSON.stringify(p,null,2):'No valid payload decoded yet.')}</div></div><div class="card" style="padding:18px"><h3>How to use</h3><ol class="hint"><li>Open your private <b>license-generator-secure.html</b>.</li><li>Generate or import your keypair.</li><li>Copy the <b>Public Key JWK</b> into this page.</li><li>Generate a signed license and paste it here.</li><li>Run the Registry SQL in Supabase and register the license row.</li><li>Click <b>Activate Online</b>.</li></ol></div></div>`}

function b64uToBuf(v){v=String(v||'').replace(/-/g,'+').replace(/_/g,'/');while(v.length%4)v+='=';let bin=atob(v),a=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i);return a.buffer}
function bufToText(b){return new TextDecoder().decode(b)}
async function getLicenseCfg(){let c=await setting('secureLicense');try{c=typeof c==='string'?JSON.parse(c||'{}'):(c||{})}catch(e){c={}}c.deviceId=c.deviceId||localStorage.tfvDeviceId||('dev_'+uid());localStorage.tfvDeviceId=c.deviceId;return c}
async function setLicenseCfg(c){await setSetting('secureLicense',JSON.stringify(c))}
async function verifySignedLicense(key,publicJwk){let parts=String(key||'').trim().split('.');if(parts.length!==3||parts[0]!=='TFV2')throw new Error('Invalid license format. Expected TFV2.payload.signature.');let pub=typeof publicJwk==='string'?JSON.parse(publicJwk):publicJwk;if(!pub)throw new Error('Public key is not installed.');let publicKey=await crypto.subtle.importKey('jwk',pub,{name:'ECDSA',namedCurve:'P-256'},true,['verify']);let ok=await crypto.subtle.verify({name:'ECDSA',hash:'SHA-256'},publicKey,b64uToBuf(parts[2]),new TextEncoder().encode(parts[1]));if(!ok)throw new Error('License signature failed. License may be fake or edited.');let payload=JSON.parse(bufToText(b64uToBuf(parts[1])));if(payload.exp&&new Date(payload.exp+'T23:59:59')<new Date())throw new Error('License expired on '+payload.exp);return payload}
async function onlineLicenseCheck(cfg,payload,activate=false){if(!cfg.url||!cfg.anonKey||!payload?.license_id)return {ok:true,online:false,reason:'Online registry not configured.'};let base=String(cfg.url).replace(/\/$/,'');let headers={apikey:cfg.anonKey,Authorization:'Bearer '+cfg.anonKey,'Content-Type':'application/json'};let url=base+'/rest/v1/tfv_licenses?license_id=eq.'+encodeURIComponent(payload.license_id)+'&select=*';let res=await fetch(url,{headers});if(!res.ok)throw new Error(await res.text());let rows=await res.json();if(!rows.length)throw new Error('License is valid locally but not registered in the online registry.');let lic=rows[0];if(['revoked','suspended'].includes(String(lic.status||'').toLowerCase()))throw new Error('License is '+lic.status+' online.');if(lic.expires_at&&new Date(lic.expires_at+'T23:59:59')<new Date())throw new Error('Online license expired on '+lic.expires_at);let actUrl=base+'/rest/v1/tfv_license_activations?license_id=eq.'+encodeURIComponent(payload.license_id)+'&select=*';let ar=await fetch(actUrl,{headers});let acts=ar.ok?await ar.json():[];let already=acts.find(a=>a.device_id===cfg.deviceId);let limit=Number(lic.max_devices||payload.max_devices||1);if(!already&&acts.length>=limit)throw new Error('Device limit reached for this license.');if(activate||!already){let body=[{license_id:payload.license_id,device_id:cfg.deviceId,device_name:cfg.deviceName||navigator.userAgent,school_id:payload.school_id,app_version:'teacher-filevault-enterprise-secure',last_seen_at:new Date().toISOString()}];let rr=await fetch(base+'/rest/v1/tfv_license_activations',{method:'POST',headers:{...headers,Prefer:'resolution=merge-duplicates'},body:JSON.stringify(body)});if(!rr.ok)throw new Error(await rr.text())}await fetch(base+'/rest/v1/tfv_license_audit',{method:'POST',headers,body:JSON.stringify([{license_id:payload.license_id,event_type:activate?'license_activated':'license_verified',device_id:cfg.deviceId,details:{school_id:payload.school_id,plan:payload.plan}}])}).catch(()=>{});return {ok:true,online:true,registry:lic,reason:'Online license verified.'}}
async function refreshLicenseState(){try{let cfg=await getLicenseCfg();if(!cfg.licenseKey||!cfg.publicKey){licenseState={ok:false,reason:'Install license key and public key.',payload:null,online:false};return licenseState}let payload=await verifySignedLicense(cfg.licenseKey,cfg.publicKey);let online={ok:true,online:false,reason:'Local signature verified. Add Supabase registry for online control.'};try{online=await onlineLicenseCheck(cfg,payload,false)}catch(e){licenseState={ok:false,reason:e.message,payload,online:true};return licenseState}licenseState={ok:true,reason:online.reason||'License verified successfully.',payload,online:!!online.online};return licenseState}catch(e){licenseState={ok:false,reason:e.message,payload:null,online:false};return licenseState}}
async function saveLicenseConfig(){let cfg=await getLicenseCfg();cfg.licenseKey=val('licKey').trim();cfg.publicKey=val('pubKey').trim();cfg.url=val('licUrl').trim();cfg.anonKey=val('licAnon').trim();cfg.deviceName=val('licDevice').trim();await setLicenseCfg(cfg);await refreshLicenseState();toast(licenseState.ok?'License verified and saved.':'Saved, but license check failed: '+licenseState.reason);render()}
async function activateOnlineLicense(){try{let cfg=await getLicenseCfg();cfg.licenseKey=val('licKey').trim()||cfg.licenseKey;cfg.publicKey=val('pubKey').trim()||cfg.publicKey;cfg.url=val('licUrl').trim()||cfg.url;cfg.anonKey=val('licAnon').trim()||cfg.anonKey;cfg.deviceName=val('licDevice').trim()||cfg.deviceName;let payload=await verifySignedLicense(cfg.licenseKey,cfg.publicKey);let online=await onlineLicenseCheck(cfg,payload,true);await setLicenseCfg(cfg);licenseState={ok:true,reason:online.reason||'Activated online.',payload,online:true};toast('License activated online.');render()}catch(e){toast('Activation failed: '+e.message)}}

function licenseRegistrySQL(){return `-- Teacher FileVault Enterprise Secure Online License Registry
create extension if not exists pgcrypto;

create table if not exists public.tfv_licenses (
  id uuid primary key default gen_random_uuid(),
  license_id text unique not null,
  license_hash text unique,
  school_id text not null,
  school_name text not null,
  plan text not null default 'ENTERPRISE',
  school_level text not null default 'BOTH',
  period_mode text not null default 'term_semester',
  status text not null default 'active',
  expires_at date not null,
  max_devices integer not null default 1,
  max_users integer not null default 1,
  max_storage_gb integer not null default 5,
  features jsonb not null default '[]'::jsonb,
  public_notes text,
  created_at timestamptz not null default now(),
  updated_at timestamptz not null default now(),
  revoked_at timestamptz
);

create table if not exists public.tfv_license_activations (
  id uuid primary key default gen_random_uuid(),
  license_id text not null references public.tfv_licenses(license_id) on delete cascade,
  device_id text not null,
  device_name text,
  school_id text,
  app_version text,
  last_seen_at timestamptz not null default now(),
  activated_at timestamptz not null default now(),
  unique(license_id, device_id)
);

create table if not exists public.tfv_license_audit (
  id uuid primary key default gen_random_uuid(),
  license_id text,
  event_type text not null,
  device_id text,
  details jsonb default '{}'::jsonb,
  created_at timestamptz not null default now()
);

alter table public.tfv_licenses enable row level security;
alter table public.tfv_license_activations enable row level security;
alter table public.tfv_license_audit enable row level security;

drop policy if exists "License public lookup" on public.tfv_licenses;
drop policy if exists "Activation public select" on public.tfv_license_activations;
drop policy if exists "Activation public insert" on public.tfv_license_activations;
drop policy if exists "Activation public update" on public.tfv_license_activations;
drop policy if exists "Audit public insert" on public.tfv_license_audit;

create policy "License public lookup"
on public.tfv_licenses for select to anon
using (status in ('active','trial','suspended','revoked'));

create policy "Activation public select"
on public.tfv_license_activations for select to anon
using (true);

create policy "Activation public insert"
on public.tfv_license_activations for insert to anon
with check (true);

create policy "Activation public update"
on public.tfv_license_activations for update to anon
using (true) with check (true);

create policy "Audit public insert"
on public.tfv_license_audit for insert to anon
with check (true);

create or replace function public.set_tfv_updated_at()
returns trigger as $$
begin
  new.updated_at=now();
  return new;
end;
$$ language plpgsql;

drop trigger if exists tfv_licenses_updated_at on public.tfv_licenses;
create trigger tfv_licenses_updated_at
before update on public.tfv_licenses
for each row execute function public.set_tfv_updated_at();

notify pgrst, 'reload schema';`}

function blobToDataURL(blob){return new Promise((ok,no)=>{let fr=new FileReader();fr.onload=()=>ok(fr.result);fr.onerror=()=>no(fr.error);fr.readAsDataURL(blob)})}
function dataURLToBlob(dataURL){let parts=String(dataURL).split(','), meta=parts[0]||'', bin=atob(parts[1]||''), mime=(meta.match(/data:(.*?);base64/)||[])[1]||'application/octet-stream', arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime})}
function downloadJSON(name,obj){let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(obj,null,2)],{type:'application/json'}));a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),2000)}
async function buildBackup(includeFiles=true){let data={app:'Teacher FileVault Enterprise',version:'secure-online-license',createdAt:now(),includeFiles,stores:{},local:{theme:localStorage.theme||'',tfvDeviceId:localStorage.tfvDeviceId||''}};for(const st of STORES){let arr=await all(st);if(st==='files'){arr=[];for(const f of await all('files')){let copy={...f};if(copy.blob instanceof Blob){copy._blobMeta={name:copy.title||'file',type:copy.blob.type||copy.type||'application/octet-stream',size:copy.blob.size};if(includeFiles)copy._blobData=await blobToDataURL(copy.blob)}delete copy.blob;arr.push(copy)}}data.stores[st]=arr}return data}
async function exportFullBackup(){try{let backup=await buildBackup(true);downloadJSON('teacher-filevault-full-backup-'+new Date().toISOString().slice(0,10)+'.json',backup);await log('Exported full backup','Included file data.');toast('Full backup downloaded. Keep it safe.')}catch(e){toast('Backup failed: '+e.message)}}

async function restoreBackupFile(){let input=$('restoreFile');let file=input?.files?.[0];if(!file)return toast('Choose a backup JSON file first.');let clear=$('clearBeforeRestore')?.checked;if(!confirm((clear?'Clear existing local data and restore backup?':'Merge backup into existing local data?')))return;try{let text=await file.text(), backup=JSON.parse(text);if(!backup.stores)throw new Error('Invalid backup file.');if(clear){for(const st of STORES){let items=await all(st);for(const it of items)await del(st,it.id)}}for(const st of STORES){for(const item of (backup.stores[st]||[])){let obj={...item};if(st==='files'&&obj._blobData){obj.blob=dataURLToBlob(obj._blobData);delete obj._blobData}delete obj._blobMeta;await put(st,obj)}}if(backup.local?.theme)localStorage.theme=backup.local.theme;if(backup.local?.tfvDeviceId)localStorage.tfvDeviceId=backup.local.tfvDeviceId;await log('Restored backup',file.name);toast('Backup restored successfully. Refreshing...');setTimeout(()=>location.reload(),900)}catch(e){toast('Restore failed: '+e.message)}}
async function backup(){let stats={};for(const st of STORES)stats[st]=(await all(st)).length;let f=await all('files'), used=f.reduce((a,b)=>a+(b.size||0),0);let q=await all('queue');$('content').innerHTML=`<section class="hero"><div class="hero-card"><span class="chip">💾 Offline Safety</span><h1>Backup & Restore Centre</h1><p class="hint">Export a complete local backup before changing devices, clearing browser data, reinstalling your browser, or resetting the app.</p><div class="actions"><button onclick="exportFullBackup()">⬇️ Export Full Backup</button><button class="secondary" onclick="exportMetadataBackup()">📄 Metadata Only</button><button class="warn" onclick="go('sync')">☁️ Cloud Sync</button></div></div><div class="hero-card"><h3>Backup Health</h3><div class="grid cols"><div class="metric"><span class="hint">Files</span><h2>${stats.files||0}</h2></div><div class="metric"><span class="hint">Local Size</span><h2>${fmt(used)}</h2></div><div class="metric"><span class="hint">Users</span><h2>${stats.users||0}</h2></div><div class="metric"><span class="hint">Queue</span><h2>${q.filter(x=>x.status!=='done').length}</h2></div></div></div></section><div class="grid cols" style="margin-top:14px"><div class="card" style="padding:18px"><h3>Restore Backup</h3><p class="hint">Choose a backup JSON exported from this app. Full backups can restore embedded files; metadata backups restore records only.</p><label>Backup JSON File<input id="restoreFile" type="file" accept="application/json,.json"></label><br><br><label style="display:flex;gap:10px;align-items:center"><input id="clearBeforeRestore" type="checkbox" style="width:auto"> Clear current local data before restore</label><br><button class="good" onclick="restoreBackupFile()">Restore Selected Backup</button></div><div class="card" style="padding:18px"><h3>What each option means</h3><div class="timeline"><div class="log"><div class="badge">📦</div><div><b>Full Backup</b><p class="hint">Best option. Includes users, settings, logs, license settings, sync settings, file records and embedded file data.</p></div></div><div class="log"><div class="badge">📄</div><div><b>Metadata Only</b><p class="hint">Smaller file. Restores records and settings, but not the actual document blobs.</p></div></div><div class="log"><div class="badge">☁️</div><div><b>Cloud Sync</b><p class="hint">Use this for multi-device use. Manual backup is still recommended for safety.</p></div></div></div></div></div><div class="card" style="padding:18px;margin-top:14px"><h3>Advanced Safety Actions</h3><p class="hint">Use reset only after exporting a backup. This removes local browser data for this app.</p><div class="actions"><button class="secondary" onclick="exportCSV()">🧾 Export File Inventory CSV</button><button class="danger" onclick="resetApp()">Reset Local Data</button></div></div>`}
async function settings(){let school=await setting('school')||'';$('content').innerHTML=`<div class="card" style="padding:18px"><h3>Settings</h3><label>School Name<input id="school" value="${esc(school)}"></label><br><br><button onclick="setSetting('school',val('school')).then(()=>toast('Saved'))">Save</button> <button class="danger" onclick="resetApp()">Reset Local Data</button></div>`}function resetApp(){if(prompt('Type RESET')==='RESET'){indexedDB.deleteDatabase(DB);localStorage.clear();location.reload()}}
async function help(){$('content').innerHTML=`<div class="grid"><div class="card" style="padding:18px"><h3>Getting Started</h3><ol class="hint"><li>Create the Super Admin account.</li><li>Select Basic School, SHS, or both.</li><li>Upload files. Basic uses Term; SHS uses Semester.</li><li>Use Sync page to connect Supabase for cloud backup and multi-device use.</li></ol></div><div class="card" style="padding:18px"><h3>Cloud Sync Instruction</h3><ol class="hint"><li>Create a Supabase project.</li><li>Open Sync page and click Show SQL.</li><li>Run the SQL in Supabase SQL Editor.</li><li>Paste Project URL and anon public key.</li><li>Enable Sync and click Sync Now.</li></ol></div></div>`}
async function cfgSync(){let c=await setting('sync');try{c=typeof c==='string'?JSON.parse(c||'{}'):(c||{})}catch(e){c={}}c.schoolId=c.schoolId||'school_'+uid();c.table=c.table||'teacher_filevault_sync';c.bucket=c.bucket||'teacher-filevault-files';c.device=c.device||'dev_'+uid();c.conflict=c.conflict||'newest';return c}async function saveCfg(c){await setSetting('sync',JSON.stringify(c))}function ready(c){return !!(c.enabled&&c.url&&c.key&&c.schoolId)}function root(c){return String(c.url||'').replace(/\/$/,'')}function hdr(c,prefer){let h={apikey:c.key,Authorization:'Bearer '+c.key,'Content-Type':'application/json'};if(prefer)h.Prefer=prefer;return h}function rest(c){return root(c)+'/rest/v1/'+c.table}function objBase(c){return root(c)+'/storage/v1/object/'+encodeURIComponent(c.bucket)}function plain(o){let p={...(o||{})};delete p.blob;return p}
async function enqueue(store,recordId,op,payload){let c=await cfgSync();if(!ready(c))return;await put('queue',{id:uid(),store,recordId,op,payload:plain(payload),status:'pending',attempts:0,createdAt:now()});if(c.auto)schedule()}function schedule(){clearTimeout(window.syncTimer);window.syncTimer=setTimeout(processQueue,1500)}function pathFor(c,f){return c.schoolId+'/'+(f.owner||'user')+'/'+f.id+'_'+String(f.title||'file').replace(/[^a-z0-9._-]/gi,'_')}
async function storageUpload(c,f){if(!(f.blob instanceof Blob))return f.cloudPath||'';let path=f.cloudPath||pathFor(c,f),url=objBase(c)+'/'+path.split('/').map(encodeURIComponent).join('/');let r=await fetch(url,{method:'POST',headers:{apikey:c.key,Authorization:'Bearer '+c.key,'Content-Type':f.blob.type||'application/octet-stream','x-upsert':'true'},body:f.blob});if(!r.ok)throw Error(await r.text());return path}async function storageDownload(c,path){let r=await fetch(objBase(c)+'/'+path.split('/').map(encodeURIComponent).join('/'),{headers:{apikey:c.key,Authorization:'Bearer '+c.key}});if(!r.ok)throw Error(await r.text());return await r.blob()}
async function syncRow(c,store,rec,deleted=false){let data=plain(rec);if(store==='files'&&!deleted){data.cloudPath=await storageUpload(c,rec);data.cloudSynced=true}return {id:c.schoolId+'__'+store+'__'+rec.id,school_id:c.schoolId,store,record_id:rec.id,data,deleted,updated_at:now(),device_id:c.device}}
async function processQueue(){let c=await cfgSync();if(!ready(c)||!navigator.onLine)return;let q=(await all('queue')).filter(x=>x.status!=='done');for(const item of q){try{let rec=item.payload;if(item.op==='upsert'&&item.store==='files')rec=(await all('files')).find(x=>x.id===item.recordId)||rec;let rr=await syncRow(c,item.store,rec,item.op==='delete');let r=await fetch(rest(c),{method:'POST',headers:hdr(c,'resolution=merge-duplicates'),body:JSON.stringify([rr])});if(!r.ok)throw Error(await r.text());item.status='done';item.syncedAt=now();await put('queue',item)}catch(e){item.status='failed';item.attempts=(item.attempts||0)+1;item.lastError=e.message;await put('queue',item);throw e}}}
async function pushAll(){let c=await cfgSync();if(!ready(c))return toast('Complete sync settings first.');let rows=[];for(const s of ['users','files','logs'])for(const x of await all(s))rows.push(await syncRow(c,s,x,false));for(let i=0;i<rows.length;i+=30){let r=await fetch(rest(c),{method:'POST',headers:hdr(c,'resolution=merge-duplicates'),body:JSON.stringify(rows.slice(i,i+30))});if(!r.ok)throw Error(await r.text())}c.lastSync=now();await saveCfg(c);toast('All data pushed to cloud.');render()}
async function pullCloud(ask=true){let c=await cfgSync();if(!ready(c))return toast('Complete sync settings first.');let r=await fetch(rest(c)+'?school_id=eq.'+encodeURIComponent(c.schoolId)+'&select=*',{headers:hdr(c)});if(!r.ok)throw Error(await r.text());let rows=await r.json();if(ask&&!confirm('Pull '+rows.length+' cloud records?'))return;for(const rw of rows){if(!STORES.includes(rw.store))continue;if(rw.deleted){await del(rw.store,rw.record_id);continue}let cloud=rw.data||{};if(rw.store==='files'&&cloud.cloudPath){try{cloud.blob=await storageDownload(c,cloud.cloudPath)}catch(e){cloud.downloadError=e.message}}await put(rw.store,cloud)}c.lastSync=now();await saveCfg(c);if(ask)toast('Cloud pulled.');if(screen==='sync')render()}
async function syncNow(){try{await processQueue();await pushAll();await pullCloud(false);toast('Sync complete.')}catch(e){console.error(e);toast('Sync failed: '+String(e.message).slice(0,160))}}
function syncSQL(){return `drop table if exists public.teacher_filevault_sync cascade;
create table public.teacher_filevault_sync (
  id text primary key,
  school_id text not null,
  store text not null,
  record_id text not null,
  data jsonb not null default '{}'::jsonb,
  deleted boolean default false,
  updated_at timestamptz default now(),
  device_id text
);
create index teacher_filevault_sync_school_idx on public.teacher_filevault_sync (school_id, store, record_id);
alter table public.teacher_filevault_sync enable row level security;
create policy "Teacher FileVault read metadata" on public.teacher_filevault_sync for select to anon using (true);
create policy "Teacher FileVault insert metadata" on public.teacher_filevault_sync for insert to anon with check (true);
create policy "Teacher FileVault update metadata" on public.teacher_filevault_sync for update to anon using (true) with check (true);
insert into storage.buckets (id,name,public,file_size_limit) values ('teacher-filevault-files','teacher-filevault-files',false,52428800) on conflict (id) do update set public=false,file_size_limit=52428800;
drop policy if exists "Teacher FileVault read files" on storage.objects;
drop policy if exists "Teacher FileVault upload files" on storage.objects;
drop policy if exists "Teacher FileVault update files" on storage.objects;
drop policy if exists "Teacher FileVault delete files" on storage.objects;
create policy "Teacher FileVault read files" on storage.objects for select to anon using (bucket_id='teacher-filevault-files');
create policy "Teacher FileVault upload files" on storage.objects for insert to anon with check (bucket_id='teacher-filevault-files');
create policy "Teacher FileVault update files" on storage.objects for update to anon using (bucket_id='teacher-filevault-files') with check (bucket_id='teacher-filevault-files');
create policy "Teacher FileVault delete files" on storage.objects for delete to anon using (bucket_id='teacher-filevault-files');
notify pgrst, 'reload schema';`}
async function sync(){let c=await cfgSync(),q=await all('queue'),cf=await all('conflicts');$('content').innerHTML=`<div class="card" style="padding:18px"><h3>Supabase Cloud Storage Sync</h3><p class="hint">Files upload to Supabase Storage. Metadata syncs to Supabase Database. Offline changes enter queue and retry when online.</p><div class="enterprise-grid"><div class="metric"><span>Status</span><h2>${ready(c)?'Ready':'Setup'}</h2></div><div class="metric"><span>Queue</span><h2>${q.filter(x=>x.status!=='done').length}</h2></div><div class="metric"><span>Conflicts</span><h2>${cf.length}</h2></div><div class="metric sync-metric"><span class="hint">Last Sync</span><span class="sync-time">${esc(formatDate(c.lastSync))}</span><span class="sync-sub">${esc(formatDateSub(c.lastSync))}</span></div></div></div><div class="card" style="padding:18px;margin-top:14px"><div class="grid cols"><label>Enable<select id="en"><option value="">No</option><option value="1" ${c.enabled?'selected':''}>Yes</option></select></label><label>Auto Sync<select id="auto"><option value="">Manual</option><option value="1" ${c.auto?'selected':''}>Background</option></select></label><label>School Sync ID<input id="sid" value="${esc(c.schoolId)}"></label><label>Project URL<input id="url" value="${esc(c.url||'')}"></label><label>Anon Key<textarea id="key">${esc(c.key||'')}</textarea></label><label>Table<input id="tab" value="${esc(c.table)}"></label><label>Bucket<input id="buck" value="${esc(c.bucket)}"></label></div><br><div class="actions"><button onclick="saveSync()">Save</button><button class="good" onclick="syncNow()">Sync Now</button><button class="secondary" onclick="pushAll()">Push All</button><button class="secondary" onclick="pullCloud(true)">Pull Cloud</button><button class="warn" onclick="processQueue().then(()=>toast('Queue processed')).catch(e=>toast(e.message))">Retry Queue</button><button class="secondary" onclick="showSQL()">Show SQL</button></div></div><div class="grid cols" style="margin-top:14px"><div class="card" style="padding:18px"><h3>Offline Queue</h3><div class="timeline">${q.slice(-10).reverse().map(x=>`<div class="log"><div class="badge">${x.status==='done'?'✅':x.status==='failed'?'⚠️':'⏳'}</div><div><b>${esc(x.op)} ${esc(x.store)}</b><div class="hint">${esc(x.status)} • attempts ${x.attempts||0}</div><div class="hint">${esc(x.lastError||'')}</div></div></div>`).join('')||'<p class="hint">No queue.</p>'}</div></div><div class="card" style="padding:18px"><h3>Conflicts</h3><p class="hint">Conflict UI is ready for future two-way editing cases.</p></div></div>`}
async function saveSync(){let c=await cfgSync();Object.assign(c,{enabled:!!val('en'),auto:!!val('auto'),schoolId:val('sid'),url:val('url'),key:val('key'),table:val('tab'),bucket:val('buck')});await saveCfg(c);toast('Sync settings saved.');if(c.auto)schedule();render()}function showSQL(){$('modal').classList.remove('hidden');$('modal').innerHTML=`<div class="box"><h3>Supabase SQL</h3><pre>${esc(syncSQL())}</pre><button onclick="$('modal').classList.add('hidden')">Close</button></div>`}
const views={dashboard,files,upload,sync,backup,analytics,reports,license,enterprise,logs,users,settings,help};
window.addEventListener('online',()=>processQueue().catch(()=>{}));setInterval(async()=>{let c=await cfgSync();if(c.auto&&ready(c))processQueue().catch(()=>{})},180000);init();
</script></body></html>
